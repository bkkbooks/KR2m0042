body:
  text: 欽定四庫全書史部十三北郊配位尊西向議政書類二儀制之屬提要臣等謹案北郊配位尊西向議一卷國朝毛竒齡撰竒齡有仲氏易巳著録康熙二十四年太常寺卿徐元珙疏奏現行祀典北郊既改北向而三祖配位仍首東次西同於南郊請酌改所向竒齡時官檢討因擬是書其斥漢元始儀之誤謂孟春合祀天位在西地位在東皆因惑於曲禮席南向北向以西方為上之文其實曲禮據常坐言之若禮坐之席則儀禮射禮皆筵賓席于户西東上自與曲禮異考鄉射禮文乃席賓南面東上賈公彥疏云言東上因主在東故席端在東不得以曲禮席南向北向西方為上解之竒齡本此以折元始儀實為有據至於元始儀配位西向南上亦相承曲禮西向東向以南方為上之文竒齡以後漢改從北上為正其論甚確然考北上之義亦本儀禮大射儀曰大夫相繼而東若有東面者則北上燕禮曰士既獻者立於東方西面北上此北上之異於南上者今竒齡知南向東上之本於儀禮而獨未知西向北上之亦本於儀禮則未免知一而不知二竒齡又謂北郊既改從北向則配位既統於所向地道尚右配位當以東為上東乃北向之右也今考儀禮大射儀曰諸公阼階西北面東上燕禮曰卿大夫皆入門右北面東上則北郊北向配位以東為上與儀禮北面東上義例全通竒齡徒以地道尚右定之亦為未審然全書考辨精核援引博贍於宋明以來議禮之家要為特出矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
